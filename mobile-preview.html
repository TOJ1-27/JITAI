<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Mobile preview page for the Shandong Jitai Machinery Co., Ltd. website." />
    <title>Mobile Preview | Shandong Jitai Machinery Co., Ltd.</title>
    <style>
      :root {
        --bg: #0f1720;
        --panel: #172231;
        --line: rgba(255, 255, 255, 0.16);
        --text: #f7fafc;
        --muted: #aeb8c5;
        --red: #d9232e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, "Microsoft YaHei", sans-serif;
        background:
          linear-gradient(135deg, rgba(217, 35, 46, 0.18), transparent 34%),
          radial-gradient(circle at 82% 18%, rgba(255, 255, 255, 0.14), transparent 30%), var(--bg);
        color: var(--text);
      }

      .preview-page {
        min-height: 100vh;
        display: grid;
        grid-template-columns: minmax(260px, 390px) minmax(320px, 430px);
        gap: 42px;
        align-items: center;
        justify-content: center;
        padding: 42px 24px;
      }

      .preview-copy {
        max-width: 390px;
      }

      .preview-copy span {
        color: var(--red);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .preview-copy h1 {
        margin: 14px 0 16px;
        font-size: 34px;
        line-height: 1.18;
      }

      .preview-copy p {
        margin: 0 0 20px;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.75;
      }

      .preview-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .preview-actions a {
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
        padding: 0 16px;
        color: var(--text);
        text-decoration: none;
        font-size: 14px;
        font-weight: 700;
      }

      .preview-actions a:first-child {
        background: var(--red);
      }

      .preview-actions a:last-child {
        border: 1px solid var(--line);
      }

      .phone-frame {
        width: min(100%, 390px);
        aspect-ratio: 390 / 844;
        margin: 0 auto;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 36px;
        background: linear-gradient(180deg, #263241, #0b1017);
        box-shadow: 0 32px 82px rgba(0, 0, 0, 0.38);
        position: relative;
      }

      .phone-frame::before {
        content: "";
        position: absolute;
        top: 10px;
        left: 50%;
        width: 88px;
        height: 18px;
        transform: translateX(-50%);
        border-radius: 0 0 14px 14px;
        background: #0b1017;
        z-index: 2;
      }

      .phone-screen {
        width: 100%;
        height: 100%;
        overflow: hidden;
        border-radius: 28px;
        background: #fff;
      }

      .phone-screen iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
        background: #fff;
      }

      @media (max-width: 820px) {
        body {
          background: #fff;
        }

        .preview-page {
          min-height: 100vh;
          display: block;
          padding: 0;
        }

        .preview-copy {
          display: none;
        }

        .phone-frame {
          width: 100vw;
          height: 100vh;
          aspect-ratio: auto;
          padding: 0;
          border: 0;
          border-radius: 0;
          box-shadow: none;
          background: #fff;
        }

        .phone-frame::before {
          display: none;
        }

        .phone-screen {
          border-radius: 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="preview-page">
      <section class="preview-copy" aria-label="Mobile preview description">
        <span>Mobile Preview</span>
        <h1>Shandong Jitai Machinery Co., Ltd. mobile website preview</h1>
        <p>
          This page simulates the mobile experience for visitors opening the website from social or messaging traffic.
          The frame uses a 390px-wide viewport.
        </p>
        <div class="preview-actions">
          <a href="index.html">Open Site</a>
          <a href="index.html?utm_source=tiktok">Simulate TikTok Source</a>
        </div>
      </section>

      <section class="phone-frame" aria-label="Mobile screen preview">
        <div class="phone-screen">
          <iframe src="index.html?preview=mobile" title="Shandong Jitai Machinery Co., Ltd. mobile preview"></iframe>
        </div>
      </section>
    </main>
  </body>
</html>
